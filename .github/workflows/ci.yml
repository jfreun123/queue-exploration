name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang clang-tidy cppcheck ninja-build

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev --parallel

      - name: Test
        run: ctest --preset dev

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang clang-tidy cppcheck ninja-build

      - name: Configure
        run: cmake --preset asan

      - name: Build
        run: cmake --build --preset asan --parallel

      - name: Test
        run: ctest --preset asan

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang clang-tidy cppcheck ninja-build

      - name: Configure
        run: cmake --preset bench

      - name: Build
        run: cmake --build --preset bench --parallel

      - name: Run
        run: ./build-bench/benchmark/queue_benchmark
